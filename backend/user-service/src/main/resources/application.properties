# ===================================================================
# USER SERVICE CONFIGURATION
# ===================================================================
spring.application.name=USER-SERVICE
server.port=8081

# Internal service, no SSL required at this layer
server.ssl.enabled=false

# ===================================================================
# EUREKA DISCOVERY
# ===================================================================
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${spring.application.name}
eureka.instance.non-secure-port-enabled=true
eureka.instance.secure-port-enabled=false
eureka.instance.non-secure-port=${server.port}
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===================================================================
# SECURITY & DATABASE (AUDIT FIX: Environment Variables)
# ===================================================================
jwt.expiration=86400000
# Falls back to local dev key if environment variable is missing
jwt.secret=${JWT_SECRET:koPbgbkWib4BshQEr4La8XgpfjzRej8BmEwCEzOpAXcI6Pj1MUQxiMykzWKgBuDklYWJJi0oy9UrqKN5odb66A==}

spring.kafka.bootstrap-servers=${KAFKA_URI:kafka:29092}

# Do not hardcode DB passwords! Use injection from Docker/Jenkins.
spring.data.mongodb.uri=${MONGO_URI:mongodb://admin:password@buy-01:27017/buy01?authSource=admin}

# ===================================================================
# FILE UPLOADS
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB