# ===================================================================
# API GATEWAY - ONLY PUBLIC-FACING SERVICE WITH HTTPS
# ===================================================================

spring.application.name=api-gateway
server.port=8443
# server.http.port=8080 (Removed if not actively used to reduce attack surface)

# HTTPS ENABLED
server.ssl.enabled=true
server.ssl.key-store=classpath:certs/keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=myapp

# 🔒 AUDIT FIX: Never hardcode passwords. Pass these via Docker/Jenkins environment variables.
server.ssl.key-store-password=${SSL_KEY_PASSWORD:changeit}
server.ssl.key-password=${SSL_KEY_PASSWORD:changeit}

# ===================================================================
# EUREKA - INTERNAL COMMUNICATION - HTTP ONLY
# ===================================================================

eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.instance.hostname=api-gateway
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=${server.port}

eureka.instance.status-page-url=https://${eureka.instance.hostname}:${server.port}/actuator/info
eureka.instance.health-check-url=https://${eureka.instance.hostname}:${server.port}/actuator/health
eureka.instance.home-page-url=https://${eureka.instance.hostname}:${server.port}/actuator/health

# ===================================================================
# GATEWAY ROUTES
# ===================================================================

# 1. Auth service (public)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# 2. Users (secured)
spring.cloud.gateway.routes[1].id=user-service-secured
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[1].filters[0]=Authentication

# # 3. Products (Public GET requests)
# spring.cloud.gateway.routes[2].id=product-service-public
# spring.cloud.gateway.routes[2].uri=lb://PRODUCT-SERVICE
# spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**
# spring.cloud.gateway.routes[2].predicates[1]=Method=GET

# 4. Products (Secured POST/PUT/DELETE requests)
spring.cloud.gateway.routes[2].id=product-service-secured
spring.cloud.gateway.routes[2].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**
spring.cloud.gateway.routes[2].filters[0]=Authentication


# 6. Media (Secured uploads with 5MB protection)
spring.cloud.gateway.routes[3].id=media-service-secured
spring.cloud.gateway.routes[3].uri=lb://MEDIA-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/media/**
# 🔒 AUDIT FIX: Replaced dead servlet config with the native Reactive RequestSize filter (5MB)
spring.cloud.gateway.routes[3].filters[0].name=RequestSize
spring.cloud.gateway.routes[3].filters[0].args.maxSize=5000000
spring.cloud.gateway.routes[3].filters[1].name=Authentication

# 7. Orders (Secured)
spring.cloud.gateway.routes[4].id=orders-service-secured
spring.cloud.gateway.routes[4].uri=lb://ORDERS-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[4].filters[0]=Authentication
#8 . Sellers (secured)
spring.cloud.gateway.routes[5].id=seller-service-secured
spring.cloud.gateway.routes[5].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/sellers/**
spring.cloud.gateway.routes[5].filters[0]=Authentication

