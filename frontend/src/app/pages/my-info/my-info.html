<div class="my-info-container">
  
  <div class="page-header">
    <h2>Account Settings</h2>
    <p>Manage your profile, avatar, and security details.</p>
  </div>

  <div *ngIf="isLoading" class="spinner-container">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <div *ngIf="errorMessage" class="alert error-message">
    <mat-icon>error_outline</mat-icon> {{ errorMessage }}
  </div>

  <mat-card *ngIf="currentUser && !isLoading" class="profile-card">
    <ng-container *ngIf="!isEditingInfo">
      
      <div class="avatar-section">
        <div class="avatar-wrapper">
          <img *ngIf="currentUser.avatarUrl" [src]="getAvatarUrl(currentUser.avatarUrl)" alt="Your Avatar" class="avatar-image">
          <div *ngIf="!currentUser.avatarUrl" class="avatar-placeholder">
            <mat-icon>person</mat-icon>
          </div>
        </div>

        <div class="avatar-actions">
          <button mat-flat-button color="primary" (click)="avatarUploadInput.click()" class="upload-btn">
            <mat-icon>photo_camera</mat-icon> Update Photo
          </button>

          <input type="file" hidden #avatarUploadInput id="avatar-upload-input" (change)="onFileSelect($event)" accept="image/*" />

          <button mat-icon-button color="warn" *ngIf="currentUser.avatarUrl" (click)="onDeleteAvatar()" matTooltip="Delete Photo" class="delete-avatar-btn">
            <mat-icon>delete_outline</mat-icon>
          </button>
        </div>
      </div>

      <mat-divider></mat-divider>

      <mat-card-content class="details-section">
        <h3 class="section-title">Personal Details</h3>
        <div class="info-grid">
          <div class="info-block">
            <span class="label">First Name</span>
            <span class="value">{{ currentUser.firstName }}</span>
          </div>
          <div class="info-block">
            <span class="label">Last Name</span>
            <span class="value">{{ currentUser.lastName }}</span>
          </div>
          <div class="info-block">
            <span class="label">Email Address</span>
            <span class="value">{{ currentUser.email }}</span>
          </div>
          <div class="info-block">
            <span class="label">Account Role</span>
            <span class="value role-badge">{{ currentUser.role | titlecase }}</span>
          </div>
        </div>
      </mat-card-content>

      <mat-divider></mat-divider>

      <mat-card-actions class="account-actions">
        <button mat-stroked-button (click)="onUpdateInfo()" class="edit-btn">
          <mat-icon>edit</mat-icon> Edit Profile
        </button>

        <button mat-flat-button color="warn" class="delete-me-btn" (click)="onDeleteMe()">
          <mat-icon>person_remove</mat-icon> Delete Account
        </button>
      </mat-card-actions>
    </ng-container>

    <app-update-info-form
      *ngIf="isEditingInfo"
      [currentUser]="currentUser"
      (close)="onFormClosed($event)">
    </app-update-info-form>
  </mat-card>
</div>

<app-image-cropper-modal
  *ngIf="showCropper"
  [imageChangedEvent]="imageChangedEvent"
  (croppedImageBlob)="handleAvatarBlob($event)"
  (modalClosed)="handleModalClose()">
</app-image-cropper-modal>
