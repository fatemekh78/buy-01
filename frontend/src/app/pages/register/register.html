<div class="auth-container">
  <div class="auth-card register-card">
    <h2>Create an Account</h2>
    <p class="subtitle">Join the platform as a Client or Seller</p>

    <form #registerForm="ngForm" (ngSubmit)="onRegister()">
      
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" [(ngModel)]="registerData.firstName" required>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" [(ngModel)]="registerData.lastName" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" [(ngModel)]="registerData.email" required email>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="registerData.password" required minlength="6">
      </div>

      <div class="form-group">
        <label for="role">I want to register as a</label>
        <select id="role" name="role" [(ngModel)]="registerData.role" class="styled-select">
          <option value="CLIENT">Customer (Buy Products)</option>
          <option value="SELLER">Seller (Open a Shop)</option>
        </select>
      </div>

      <!-- Smooth transition for Seller Avatar upload -->
      <div class="form-group slide-in" *ngIf="registerData.role === 'SELLER'">
        <label for="avatar">Shop Logo / Avatar (Optional)</label>
        <div class="file-upload-wrapper">
          <input type="file" id="avatar" accept="image/*" (change)="onFileSelected($event)" class="file-input">
        </div>

        <div class="preview-container" *ngIf="croppedImage">
          <img [src]="croppedImage" class="avatar-preview" alt="Avatar preview" />
          <p class="preview-text">Looks great!</p>
        </div>
      </div>

      <button type="submit" [disabled]="!registerForm.valid || isLoading">
        <span *ngIf="!isLoading">Create Account</span>
        <span *ngIf="isLoading">Registering...</span>
      </button>
    </form>
    
    <p class="footer-text">
      Already have an account? <a routerLink="/auth/login">Login here</a>
    </p>
  </div>
</div>

<app-image-cropper-modal
  *ngIf="showCropper"
  [imageChangedEvent]="imageChangedEvent"
  (croppedImageBlob)="handleImageBlob($event)"
  (modalClosed)="handleModalClose()">
</app-image-cropper-modal>
