<div class="dialog-container">

  <div *ngIf="isLoading" class="loading-overlay">
    <mat-spinner diameter="50"></mat-spinner>
    <p>Saving Changes...</p>
  </div>

  <div class="dialog-header">
    <h2 mat-dialog-title>
      <mat-icon class="header-icon">edit_note</mat-icon>
      <span>Edit Product</span>
    </h2>
  </div>

  <mat-dialog-content class="dialog-content" [class.loading-blur]="isLoading">
    <mat-tab-group dynamicHeight animationDuration="200ms" color="primary">

      <mat-tab label="Product Details">
        <form [formGroup]="editForm" class="details-form">
          <mat-form-field appearance="outline">
            <mat-label>Product Name</mat-label>
            <input matInput formControlName="name">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="4"></textarea>
          </mat-form-field>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Price (USD)</mat-label>
              <input matInput type="number" formControlName="price" min="0.01" step="0.01">
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Available Quantity</mat-label>
              <input matInput type="number" formControlName="quantity" min="0">
            </mat-form-field>
          </div>
        </form>
      </mat-tab>

      <mat-tab label="Manage Images">
        <div class="image-section">

          <div class="section-block">
            <h4 class="section-title">Current Images</h4>
            <p class="empty-state" *ngIf="currentMedia.length === 0">This product has no active images.</p>

            <div class="image-grid">
              <div *ngFor="let media of currentMedia; let i = index" class="thumbnail-wrapper"
                [class.deleting]="mediaToDelete.includes(media.fileId)">
                <img [src]="getImageUrl(media.fileUrl)" alt="Product Image" class="thumbnail">
                <button mat-icon-button class="delete-image-btn" (click)="deleteExistingImage(media.fileId, i)"
                  matTooltip="Remove Image">
                  <mat-icon>close</mat-icon>
                </button>
              </div>
            </div>
          </div>

          <mat-divider></mat-divider>

          <div class="section-block">
            <h4 class="section-title">Upload New Images</h4>

            <div class="upload-area">
              <input type="file" id="images" class="file-input" (change)="onFilesSelected($event)"
                accept="image/png, image/jpeg, image/gif, image/webp" multiple>
            </div>

            <div class="file-errors" *ngIf="fileErrors.length > 0">
              <div class="error-item" *ngFor="let error of fileErrors">
                <mat-icon>error_outline</mat-icon>
                <span>{{ error }}</span>
              </div>
            </div>

            <div class="file-list" *ngIf="filesToUpload.length > 0">
              <p class="staged-title">Staged for upload:</p>
              <ul>
                <li *ngFor="let file of filesToUpload; let i = index">
                  <span class="file-name"><mat-icon class="sm-icon">image</mat-icon> {{ file.name }}</span>
                  <button mat-icon-button (click)="removeNewFile(i)" class="remove-btn" color="warn">
                    <mat-icon>remove_circle</mat-icon>
                  </button>
                </li>
              </ul>
            </div>
          </div>

        </div>
      </mat-tab>
    </mat-tab-group>
  </mat-dialog-content>

  <mat-dialog-actions class="dialog-actions">
    <button mat-button (click)="onCancel()" [disabled]="isLoading" class="cancel-btn">Cancel</button>
    <button mat-flat-button (click)="onSave()" [disabled]="editForm.invalid || !hasChanges || isLoading"
      class="confirm-btn">
      <mat-icon>save</mat-icon> Save Changes
    </button>
  </mat-dialog-actions>

</div>
