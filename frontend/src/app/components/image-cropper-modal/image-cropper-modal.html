<div class="cropper-modal-overlay">
  <div class="cropper-modal-content">
    
    <div class="modal-header">
      <h3>
        <mat-icon color="primary">crop</mat-icon>
        Adjust Avatar
      </h3>
    </div>

    <div class="cropper-wrapper">
      <image-cropper
        [imageChangedEvent]="imageChangedEvent"
        [maintainAspectRatio]="true"
        [aspectRatio]="1 / 1"
        [roundCropper]="true"
        [resizeToWidth]="256"
        format="png"
        (imageCropped)="imageCropped($event)"
        (loadImageFailed)="loadImageFailed()"
      ></image-cropper>
    </div>

    <div class="preview-container" *ngIf="croppedImage">
      <p class="preview-label">Preview</p>
      <img [src]="croppedImage" alt="Cropped image preview" class="avatar-preview" />
    </div>

    <div class="cropper-buttons">
      <button mat-button (click)="cancelCrop()" class="cancel-btn">Cancel</button>
      <button mat-flat-button color="primary" (click)="saveCrop()" [disabled]="!croppedBlob" class="save-btn">
        <mat-icon>check</mat-icon> Save
      </button>
    </div>

  </div>
</div>
