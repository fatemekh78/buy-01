<div class="dialog-container">
  
  <div class="dialog-header" [class.destructive-header]="data.isDestructive">
    <h2 mat-dialog-title>
      <mat-icon class="header-icon">lock</mat-icon>
      <span>{{ data.title }}</span>
    </h2>
  </div>

  <mat-dialog-content class="dialog-content">
    <p class="message-text">{{ data.message }}</p>

    <mat-form-field appearance="outline" class="password-field">
      <mat-label>Enter Password</mat-label>
      <input 
        matInput 
        type="password" 
        [(ngModel)]="password" 
        (keyup.enter)="password ? onConfirm() : null" 
        cdkFocusInitial
        placeholder="••••••••">
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions class="dialog-actions">
    <button mat-button (click)="onCancel()" class="cancel-btn">
      {{ data.cancelText || 'Cancel' }}
    </button>
    <button 
      mat-flat-button 
      (click)="onConfirm()" 
      [disabled]="!password"
      class="confirm-btn"
      [class.btn-danger]="data.isDestructive"
      [class.btn-success]="!data.isDestructive">
      {{ data.confirmText || 'Verify Password' }}
    </button>
  </mat-dialog-actions>

</div>
